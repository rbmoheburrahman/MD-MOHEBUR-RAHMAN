name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # গিটহাবের নিজস্ব গ্রেডল রানার ব্যবহার করা হচ্ছে যা gradlew ফাইল ছাড়া নিজেই বিল্ড করতে পারে
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Build with Gradle
      run: gradle assembleDebug
